
save_dir: './work_dirs/recondrive_ae_training'
seed: 1
train_epoch: 10
devices: [0,1,2,3,4,5,6,7]


model_cfg:
  height: 280
  width: 518
  render_width_min: 259
  render_width_max: 768
  num_cams: 6
  embed_dim: 1024
  auto_scale_lr: True
  learning_rate: 0.0001
  weight_decay: 0.01
  lr_restart_epoch: 5
  lr_restart_mult: 2
  lr_min_factor: 0.01

  frame_ids: [0, 1]

  use_vehicle_flow: true

  depth_conf_thr: 0.99
  min_depth: 1.5
  max_depth: 110
  focal_length_scale: 300
  sh_degree: 4

  save_image_duration: 100
  save_val_visualizations: true
  val_vis_interval: 200
  val_vis_max_per_epoch: 4
  train_vis_interval: 50

  lambda_project: 1.0
  lambda_edge: 0.1
  lambda_depth: 0.001
  lambda_gaussian: 2
  lambda_scale: 0.01
  lambda_opacity: 0.01

  vggt_checkpoint: 'checkpoints/vggt.pt'
  sam2_checkpoint: 'checkpoints/sam2.1_hiera_small.pt'
  sam2_model_cfg: 'configs/sam2.1/sam2.1_hiera_s.yaml'
  sam2_dir: null
  use_gaussian_ae: true

  # ---- Gaussian Autoencoder config ----
  ae_cfg:
    # Backbone freeze control
    freeze_backbone: true  # Set to false to train both backbone and AE together

    voxel_size: 0.4
    x_range: [-40, 40]
    y_range: [-40, 40]
    z_range: [-1, 5.4]
    encoder_channels: [32, 64, 128, 256]
    K: 4                    # Gaussians per voxel output by decoder

    # Attribute reconstruction loss weights (Chamfer matching)
    lambda_xyz:     1.0
    lambda_rot:     0.5
    lambda_scale:   0.5
    lambda_opacity: 0.5
    lambda_sh:      0.1
    chamfer_alpha:  0.5         # 0.5=symmetric, 1.0=pred→gt only, 0.0=gt→pred only

    # Rendering loss weight (multiplied onto compute_gaussian_loss output)
    lambda_render:  1.0
    # Range-visibility mask for AE render loss
    use_range_render_mask: true
    range_mask_alpha_thresh: 0.01


data_cfg:
  data_path: './data/nuscenes/'
  cache_dir: './work_dirs/cache_data/nuscenes-12HZ'
  height: 280
  width: 518
  back_context: 0
  forward_context: 0
  depth_type: 'lidar'
  nuscenes_version: 'v1.0-trainval'
  context_span: 6
  cameras: ['CAM_FRONT', 'CAM_FRONT_LEFT', 'CAM_FRONT_RIGHT', 'CAM_BACK_LEFT', 'CAM_BACK_RIGHT', 'CAM_BACK']
  train_requirements: (gt_pose, gt_ego_pose, gt_depth, mask)
  val_requirements: (gt_pose, gt_ego_pose, gt_depth, mask)

  batch_size: 6  # Reduced to 2 to avoid GPU OOM
  data_shuffle: True
  drop_last: False
  num_workers: 1  # Set to 0 to avoid shared memory issues with 8 GPUs
  num_epochs: 10
