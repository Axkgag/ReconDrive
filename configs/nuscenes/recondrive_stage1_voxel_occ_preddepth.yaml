save_dir: './work_dirs/recondrive_stage1_voxel_training'
seed: 42
train_epoch: 20
devices: [0,1,2,3,4,5,6,7]

# Occ 监督统一开关（定义锚点，只需在此处修改）
enable_occ: &enable_occ true  # 设为 true 启用 Occ 监督功能

model_cfg:
  use_stage1: true
  model_variant: 'voxel'
  height: 280
  width: 518
  render_width_min: 259
  render_width_max: 768
  num_cams: 6
  embed_dim: 1024
  auto_scale_lr: True
  enable_nan_checks: true
  learning_rate: 0.00001
  use_separate_depth_optimizer: true  # true: depth_head 使用独立参数组；false: 与其他参数共用一个参数组
  depth_head_lr: 0.000003             # depth_head 专用学习率，仅在 use_separate_depth_optimizer=true 时生效
  depth_head_weight_decay: 0.01       # depth_head 专用 weight decay
  voxel_depth_source: 'pred'          # voxel head lifting 的 depth 来源: pred/gt（默认 pred）
  
  weight_decay: 0.01
  lr_restart_epoch: 5
  lr_restart_mult: 2
  lr_min_factor: 0.01

  # Single-frame prediction (frame 0 only)
  frame_ids: [0]
  context_span: 0
  use_vehicle_flow: false

  depth_conf_thr: 0.99
  min_depth: 1.5
  max_depth: 110
  focal_length_scale: 300
  sh_degree: 4

  # Voxel settings
  voxel_size: 0.4
  voxel_x_range: [-40.0, 40.0]
  voxel_y_range: [-40.0, 40.0]
  voxel_z_range: [-1.0, 5.4]
  voxel_feature_dim: 256
  voxel_gaussians_per_voxel: 4

  save_image_duration: 100
  save_val_visualizations: true
  val_vis_interval: 200
  val_vis_max_per_epoch: 4
  train_vis_interval: 50

  # Loss weights (Gaussian + Norm)
  lambda_gaussian: 2
  lambda_scale: 0.01
  lambda_opacity: 0.01
  lambda_edge: 0.01
  lambda_depth: 0.01
  enable_depth_supervision: true
  # depth_head 解冻范围: none | output_conv2 | output_conv1 | refinenet | full
  depth_head_unfreeze: 'output_conv2'

  # Occ 监督配置（引用统一开关）
  enable_occ_supervision: *enable_occ  # 引用全局开关
  lambda_occ: 0.5  # Occ 损失权重（启用时生效）

  # Model checkpoint paths
  vggt_checkpoint: 'checkpoints/vggt.pt'
  sam2_checkpoint: 'checkpoints/sam2.1_hiera_small.pt'
  sam2_model_cfg: 'configs/sam2.1/sam2.1_hiera_s.yaml'
  sam2_dir: null

data_cfg:
  dataset_type: '3d'
  data_path: './data/nuscenes/'
  cache_dir: './work_dirs/cache_data/nuscenes-12HZ'
  height: 280
  width: 518
  back_context: 0
  forward_context: 0
  depth_type: 'dense'
  depth_root: './data/nuscenes/depth'
  nuscenes_version: 'v1.0-trainval'
  context_span: 0
  cameras: ['CAM_FRONT', 'CAM_FRONT_LEFT', 'CAM_FRONT_RIGHT', 'CAM_BACK_LEFT', 'CAM_BACK_RIGHT', 'CAM_BACK']
  train_requirements: (gt_pose, gt_ego_pose, gt_depth, mask)
  val_requirements: (gt_pose, gt_ego_pose, gt_depth, mask)

  occ_data_path: './data/nuscenes/OCC'
  occ_mask_dir_train: './data/nuscenes/occ_masks_train_rasterization'
  occ_mask_dir_val: './data/nuscenes/occ_masks_val_rasterization'
  # Occ 数据加载配置（引用统一开关）
  enable_occ_supervision: *enable_occ  # 引用全局开关，与 model_cfg 保持同步
  filter_missing_occ: *enable_occ  # 设为 true 时跳过没有 Occ 数据的样本

  batch_size: 2
  data_shuffle: True
  drop_last: False
  num_workers: 4
  num_epochs: 10
